app:
  name: api-gateway
  host: localhost
  port: 8080
  debug: true
  readTimeout: 10
  writeTimeout: 60
  whitelist:
    - http://localhost:3000
    - http://localhost:5173
    - https://wetalk-ute.vercel.app

log:
  level:
  filePath:
  maxSizeMB: 10
  console: true
  dashboardToken:
  requestLogPath:

services:
  - name: wetalk-academy
    prefix: /academy
    target: http://localhost:8046/api/v1
    healthPath: /api/v1/health
    monitorPath: /admin/logs?token=ZHVjcGhhdGRlcHRyYWk
  - name: social-platform
    prefix: /social
    target: http://localhost:8045/api/v1
    healthPath: /api/v1/health
    monitorPath: /admin/logs?token=ZHVjcGhhdGRlcHRyYWk
  - name: social-platform-media
    prefix: /social-media
    target: http://localhost:8044
    healthPath: /health
    monitorPath: /admin/logs?token=ZHVjcGhhdGRlcHRyYWk

redis:
  host:
  port:
  password:
  db:
  poolSize:
  required:

rateLimit:
  enabled: true
  global:
    limit: 100
    window: 60
  routes:
    - pattern: /social/auth/login
      limit: 5
      window: 60
    - pattern: /social/auth/google-login
      limit: 5
      window: 60
    - pattern: /social/chatbot
      limit: 5
      window: 60
    - pattern: /academy/judge0
      limit: 10
      window: 60

cache:
  enabled: true
  routes:
    - pattern: /social/posts
      ttl: 30
    - pattern: /social/communities
      ttl: 60
    - pattern: /social/users
      ttl: 120
    - pattern: /academy/topics
      ttl: 300
    - pattern: /academy/lessons
      ttl: 300

database:
  postgres:
    dsn:
  mongo:
    uri:
  redis:
    url:
